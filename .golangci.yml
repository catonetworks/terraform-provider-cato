# https://golangci-lint.run/usage/configuration/
version: "2"
run:
  go: "1.25"
output:
  formats:
    text:
      path: stdout
      colors: true
linters:
  default: none # previously disable-all:true
  #default: all # previously enable-all:true
  enable:
    - bodyclose
    - dogsled
    - errcheck
    - funlen
    - gochecknoinits
    - goconst
    - gocritic
    - gocyclo
    - goprintffuncname
    - gosec
    - govet
    - ineffassign
    - lll
    - misspell
    - mnd
    - nakedret
    - nolintlint
    # - nonamedreturns
    - revive
    # - rowserrcheck https://github.com/golangci/golangci-lint/issues/2649.
    - staticcheck
    - unconvert
    - unparam
    - unused
    - whitespace
    # don't enable:
    # - asciicheck
    # - gochecknoglobals
    # - gocognit  40 >
    # - godot
    # - godox
    # - err113
    # - nestif
    # - prealloc
    # - testpackage
    # - wsl
  settings:
    errcheck:
      exclude-functions:
        - fmt.Fprint
        - fmt.Fprintf
        - fmt.Fprintln
    funlen:
      lines: 100
      statements: 50
    goconst:
      min-len: 2
      min-occurrences: 2
    gocritic:
      disabled-checks:
        - dupImport # https://github.com/go-critic/go-critic/issues/845
        - rangeValCopy # generics panic
        - typeDefFirst # generics panic
        - paramTypeCombine # generics panic linux only, mac ok
        - hugeParam # generics panic
        - whyNoLint
        - sloppyReassign
      enabled-tags:
        - diagnostic
        - experimental
        - opinionated
        - performance
        - style
    gocyclo:
      min-complexity: 15
    govet:
      disable:
        - fieldalignment
        - shadow
        - unusedwrite
      enable-all: true
    lll:
      line-length: 140
      tab-width: 1
    misspell:
      locale: US
    mnd:
      checks:
        - case
        - condition
        - return
      ignored-numbers:
        - "493"
        - "420"
    nolintlint:
      require-explanation: false # don't require an explanation for nolint directives
      require-specific: false # don't require nolint directives to be specific about which linter is being skipped
      allow-unused: false # report any unused nolint directives
  exclusions:
    generated: lax
    # Excluding configuration per-path, per-linter, per-text and per-source
    rules:
      # specify linter which should be excluded on test files
      - linters:
          - funlen
          - lll
        path: .*_test\.go
      - linters:
          - lll
        source: '^//go:generate '
      - linters:
          - staticcheck
        text: 'ST1000: at least one file in a package should have a package comment'
      - linters:
          - revive
        text: 'package-comments: should have a package comment'
      - path: (.+)\.go$
        text: exported (var|type|method|function|const) (.+) should have comment (.+)
    paths:
      - libci
      - tmp
      - docs
      - testData
      - third_party$
      - builtin$
      - examples$
formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/catonetworks/terraform-provider-cato
  exclusions:
    generated: lax
    paths:
      - libci
      - tmp
      - docs
      - testData
      - third_party$
      - builtin$
      - examples$
