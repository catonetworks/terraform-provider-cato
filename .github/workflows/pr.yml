name: pull-request
on:
    push:
    pull_request:

permissions:
    contents: read
    pull-requests: read

jobs:
  vulnerability:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Run vuln check
        run: make vul

  test:
    runs-on: ubuntu-latest

    env:
      CATO_ACCOUNT_ID: ${{ vars.CATO_ACCOUNT_ID }}
      CATO_ENDPOINT: ${{ vars.CATO_ENDPOINT }}
      CATO_BASEURL: ${{ vars.CATO_ENDPOINT }}
      CATO_TOKEN: ${{ secrets.CATO_TOKEN }}
      TFACC_TEST_VARS: ${{ vars.TFACC_TEST_VARS }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Run unit tests
        run: make test

      - name: Run acceptance tests
        run: make acctest
