name: pull-request
on:
    pull_request:

permissions:
    contents: read
    pull-requests: read

jobs:
    lint:
        runs-on: ubuntu-latest
        steps:
        - uses: actions/checkout@v6
    
        - uses: actions/setup-go@v6
          with:
            go-version: 1.25
        
        - name: golangci-lint
          uses: golangci/golangci-lint-action@v9
          with:
            version: v2.11
            only-new-issues: true

    build:
        runs-on: ubuntu-latest
        steps:
        - uses: actions/checkout@v6
    
        - uses: actions/setup-go@v6
          with:
            go-version: 1.25
        
        - name: Build
          run: go build -v ./...
    
    test:
        runs-on: ubuntu-latest
        steps:
        - uses: actions/checkout@v6
    
        - uses: actions/setup-go@v6
          with:
            go-version: 1.25
        
        - name: Test
          run: make test
