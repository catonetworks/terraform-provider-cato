name: pull-request
on:
    push:

permissions:
    contents: read
    pull-requests: read

jobs:
  vulnerability:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Run vuln check
        run: make vul

  test:
    runs-on: ubuntu-latest

    env:
      CATO_ACCOUNT_ID: ${{ vars.CATO_ACCOUNT_ID }}
      CATO_ENDPOINT: ${{ vars.CATO_ENDPOINT }}
      CATO_BASEURL: ${{ vars.CATO_ENDPOINT }}
      CATO_TOKEN: ${{ secrets.CATO_TOKEN }}
      TFACC_TEST_VARS: ${{ vars.TFACC_TEST_VARS }}
      TFACC_TEST_SKIP: ${{ vars.TFACC_TEST_SKIP }}
      TFACC_ENABLE_RULES_INDEX_CRUD: "true"

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Run linter
        run: make lint

      - name: Run unit tests
        run: make test

      - name: Run acceptance tests
        run: make acctest-flaky
